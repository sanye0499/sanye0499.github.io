<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>永夜剧场 | 沉浸式阅读器</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-bg: rgba(20, 20, 25, 0.98);
            --accent-color: #8a63d2; 
            --text-color: #b0b0b0;
            --title-color: #ffffff;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-color); color: var(--text-color); font-family: "PingFang SC", "Microsoft YaHei", serif; overflow: hidden; display: flex; flex-direction: column; }
        header { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.8); border-bottom: 1px solid #222; z-index: 10; }
        .logo { font-size: 1.2rem; letter-spacing: 3px; color: var(--accent-color); font-weight: bold; }
        .controls { display: flex; gap: 15px; }
        
        /* 按钮样式 */
        .btn { border: 1px solid var(--accent-color); padding: 6px 15px; cursor: pointer; color: var(--accent-color); background: transparent; transition: 0.3s; font-size: 14px; }
        .btn:hover { background: var(--accent-color); color: white; }
        input[type="file"] { display: none; }

        main { flex: 1; overflow-y: auto; padding: 40px 5%; scrollbar-width: thin; scrollbar-color: var(--accent-color) #111; }
        .content-card { max-width: 850px; margin: 0 auto; background: var(--panel-bg); padding: 50px; box-shadow: 0 0 50px rgba(0,0,0,0.8); line-height: 2; font-size: 1.2rem; white-space: pre-wrap; word-break: break-all; min-height: 90vh; }
        h2#doc-title { text-align: center; color: var(--title-color); margin-bottom: 40px; border-bottom: 1px dashed #333; padding-bottom: 20px; }
    </style>
</head>
<body>

<header>
    <div class="logo">THEATER OF EVERNIGHT</div>
    <div class="controls">
        <button class="btn" onclick="toggleEncoding()">切换编码 (修复乱码)</button>
        <label class="btn">
            开启剧目 <input type="file" id="filePicker">
        </label>
    </div>
</header>

<main id="readerArea">
    <div class="content-card">
        <h2 id="doc-title">未读剧本</h2>
        <div id="textContent">请点击右上角开启您的文本。</div>
    </div>
</main>

<script>
    let currentRawData = null;
    let isGBK = false;

    const filePicker = document.getElementById('filePicker');
    const textContent = document.getElementById('textContent');
    const docTitle = document.getElementById('doc-title');

    // 处理文件读取
    filePicker.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        docTitle.innerText = file.name;
        const reader = new FileReader();
        
        reader.onload = function(event) {
            currentRawData = event.target.result;
            renderText();
        };
        reader.readAsArrayBuffer(file);
    });

    // 核心渲染函数
    function renderText() {
        if (!currentRawData) return;
        
        // 如果是 GBK 模式就用 GBK 解码，否则用 UTF-8
        const encoding = isGBK ? 'gbk' : 'utf-8';
        const decoder = new TextDecoder(encoding);
        let text = decoder.decode(currentRawData);
        
        // 自动检测：如果没手动切换且 UTF-8 出现了乱码字符，尝试自动切一次 GBK
        if (!isGBK && text.includes('')) {
            isGBK = true;
            renderText();
            return;
        }

        textContent.innerText = text;
        document.getElementById('readerArea').scrollTop = 0;
    }

    // 手动切换逻辑
    function toggleEncoding() {
        isGBK = !isGBK;
        const mode = isGBK ? "GBK (针对简体中文)" : "UTF-8 (通用)";
        console.log("切换到: " + mode);
        renderText();
    }
</script>

</body>
</html>
